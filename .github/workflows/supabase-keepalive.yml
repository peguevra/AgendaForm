name: Supabase KeepAlive

on:
  schedule:
    - cron: '0 */12 * * *'
  workflow_dispatch:

jobs:
  keepalive:
    runs-on: ubuntu-latest

    steps:
      - name: Query agendas table
        run: |
          curl -H "apikey: ${{ secrets.SUPABASE_ANON_KEY }}" \
               -H "Authorization: Bearer ${{ secrets.SUPABASE_ANON_KEY }}" \
               "https://ejtwfrmfteaxdexoyfwk.supabase.co/rest/v1/agendas?select=office&limit=1"